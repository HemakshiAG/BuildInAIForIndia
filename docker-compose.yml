version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: bridgecare
      POSTGRES_PASSWORD: bridgecare
      POSTGRES_DB: bridgecare
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://bridgecare:bridgecare@db:5432/bridgecare
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: celery -A backend.core.celery_app.celery_app worker --loglevel=info --concurrency=1
    environment:
      - DATABASE_URL=postgresql://bridgecare:bridgecare@db:5432/bridgecare
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis
      - db
  beat:
    build: ./backend
    command: celery -A backend.core.celery_app.celery_app beat --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
